spring:
  application:
    name: bpao-support-system
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      #SI YA CREASTES ANTES LA BD
      mode: never
      #SI NO TIENES CREADO LA BD
      #mode: always